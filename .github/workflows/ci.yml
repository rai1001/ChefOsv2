name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs previas del mismo ref cuando llega un push nuevo (ahorra minutos)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  test-e2e:
    runs-on: ubuntu-latest
    needs: [lint-typecheck, build]
    # E2E requiere secrets. Si no están configurados aún, el job se salta
    # en lugar de fallar ruidosamente (útil mientras Israel los añade).
    if: ${{ vars.E2E_ENABLED == 'true' }}
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      E2E_BASE_URL: http://localhost:3003
      E2E_PORT: '3003'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      # Seed determinista (requiere service_role key)
      - name: Seed test hotel
        run: npm run db:seed

      # Arrancar dev server en background (puerto sincronizado con E2E_PORT)
      - name: Start Next.js dev server
        run: npm run dev -- --port $E2E_PORT &

      # Esperar a que el server responda
      - name: Wait for dev server
        run: npx wait-on http://localhost:3003 --timeout 60000

      # Ejecutar E2E (el globalSetup re-corre seed, saltable con E2E_SKIP_SEED=1)
      - name: Run Playwright E2E
        run: E2E_SKIP_SEED=1 npx playwright test --reporter=github

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
